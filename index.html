<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clover's Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#081f2c; --ink-soft:#46586a;
  --red:#cf3339; --red-deep:#a3262b;
  --teal:#62cbc9; --teal-deep:#3aa6a4;
  --green:#3fa86b; --green-deep:#2f8a55;
  --sun:#ffc24a; --cream:#fffdf8; --paper:#eef5f5; --line:#e2eaea;
  --shadow:0 12px 30px rgba(8,31,44,.16); --shadow-sm:0 5px 16px rgba(8,31,44,.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(900px 380px at 50% -6%, #d7f1f0, transparent 70%),linear-gradient(180deg,#eafafa,#fef9f2 45%,#eef6f7);}
.wrap{max-width:760px;margin:0 auto;padding:12px 14px 80px;}

.app-header{display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;border-radius:18px;padding:10px 16px;box-shadow:var(--shadow);}
.app-header .logo{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(18px,4.5vw,24px);display:flex;align-items:center;gap:8px;}
.app-header .bun{font-size:24px;}
.hud{margin-left:auto;display:flex;gap:7px;}
.chip{display:flex;align-items:center;gap:6px;background:#0f3145;border:1px solid #1d4a63;border-radius:999px;padding:6px 12px;font-weight:800;font-size:15px;}
.chip.pop{animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}

nav.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0 14px;}
.tab{appearance:none;border:2px solid var(--line);background:var(--cream);border-radius:15px;padding:9px 4px;cursor:pointer;
  font-family:'Fredoka',sans-serif;font-weight:600;color:var(--ink-soft);font-size:13.5px;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:var(--shadow-sm);}
.tab .emo{font-size:20px;}
.tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
.tab:focus-visible{outline:3px solid var(--teal);outline-offset:2px;}

.panel{display:none;} .panel.active{display:block;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.intro{text-align:center;font-weight:700;color:var(--ink-soft);margin:2px 0 10px;font-size:15px;}

.card{background:var(--cream);border:2px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);}
h2{font-family:'Fredoka',sans-serif;font-weight:700;margin:0 0 4px;font-size:24px;}
h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0 0 8px;}
.sub{color:var(--ink-soft);font-weight:700;font-size:14px;margin:0 0 14px;}

.btn{appearance:none;border:none;cursor:pointer;font-family:'Fredoka',sans-serif;font-weight:600;border-radius:14px;
  padding:12px 20px;font-size:17px;color:#fff;background:var(--red);box-shadow:0 5px 0 var(--red-deep);transition:transform .08s,box-shadow .08s;}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--red-deep);}
.btn.teal{background:var(--teal);box-shadow:0 5px 0 var(--teal-deep);}
.btn.green{background:var(--green);box-shadow:0 5px 0 var(--green-deep);}
.btn.ghost{background:#fff;color:var(--ink);border:2px solid var(--line);box-shadow:var(--shadow-sm);}
.btn.sm{padding:9px 14px;font-size:15px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.center{text-align:center;} .mt{margin-top:14px;}

/* stop overlay */
.stop-ov{position:fixed;inset:0;background:rgba(8,31,44,.55);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:18px;overflow:auto;}
.stop-ov.show{display:flex;}
.stop-card{background:var(--cream);border-radius:22px;max-width:560px;width:100%;box-shadow:var(--shadow);overflow:hidden;margin:auto;}
.stop-hero{position:relative;background:linear-gradient(160deg,#0f3145,#081f2c);text-align:center;padding:16px;}
.stop-hero img{max-height:240px;max-width:90%;border-radius:16px;box-shadow:0 10px 24px rgba(0,0,0,.35);}
.stop-x{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;border:none;background:#fff;color:var(--ink);font-size:20px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-sm);}
.stop-name{font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-top:10px;}
.stop-body{padding:20px;}
.cs{text-align:center;font-weight:700;color:var(--ink-soft);font-size:17px;padding:14px;}

/* generic game bits reused by stop files */
.q-opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:16px;color:var(--ink);}
.q-opt:hover{border-color:var(--teal);}
.passage{font-size:17px;line-height:1.7;background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:16px;}
.passage p{margin:0 0 10px;}
.answer-input{font-family:'Fredoka',sans-serif;font-weight:700;font-size:44px;text-align:center;width:180px;max-width:80%;border:none;border-bottom:5px solid var(--teal);background:transparent;color:var(--red);outline:none;}
.bigproblem{font-family:'Fredoka',sans-serif;font-weight:700;font-size:52px;margin:6px 0;}
.fb{min-height:24px;font-weight:800;font-size:16px;margin:8px 0;}
.fb.ok{color:var(--green-deep);} .fb.no{color:var(--red-deep);}
.timer{font-family:'Fredoka',sans-serif;font-weight:700;color:var(--ink-soft);}
.story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.story-pick{border:2px solid var(--line);background:#fff;border-radius:14px;padding:14px;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;}
.story-pick .emo{font-size:32px;} .story-pick b{display:block;font-family:'Fredoka',sans-serif;margin-top:6px;font-size:15px;}

/* home dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dash-box{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
.dash-box .num{font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;}
.shelf{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.treat{width:54px;height:54px;border-radius:14px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:26px;background:#fff;filter:grayscale(1) opacity(.4);}
.treat.have{filter:none;border-style:solid;border-color:var(--sun);background:#fff6df;}
.nameinput{font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;border:2px solid var(--line);border-radius:10px;padding:8px 10px;width:170px;}

#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(140%);background:var(--ink);color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;padding:13px 20px;border-radius:999px;box-shadow:var(--shadow);z-index:60;font-size:16px;transition:transform .35s cubic-bezier(.2,1.3,.4,1);max-width:90vw;text-align:center;}
#toast.show{transform:translateX(-50%) translateY(0);}
.confetti{position:fixed;top:-20px;font-size:20px;z-index:70;pointer-events:none;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9}}

.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin:10px auto 0;font-size:12px;font-weight:700;color:#6b7a5f;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.lk{width:20px;height:11px;border-radius:4px;display:inline-block;}
.lk.river{background:#7fc9e6;} .lk.road{background:#c5a06a;} .lk.rail{background:#62cbc9;} .lk.active{background:#cf3339;}

/* ===== map styles (scoped) ===== */
.kc-scope{ --ink:#33433a; --land:#dcebc6; --land-edge:#c7dcab; --water:#7fc9e6; --water-edge:#54aacb;
  --road:#c5a06a; --road-mid:#efe2c4; --hot:#cf3339; --hot-2:#ff6f3d; --wood:#a9763f; --wood-dark:#7d5429; --rail:#62cbc9; --rail-hot:#8ad9d7; }
.kc-scope svg{width:100%;height:auto;display:block;touch-action:manipulation;}
.map-wrap{width:100%;max-width:600px;margin:0 auto;background:#fffdf6;border:3px solid #e6dcbd;border-radius:22px;box-shadow:0 18px 40px -18px rgba(60,70,40,.45);padding:10px;}
.tile{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .18s cubic-bezier(.3,1.3,.5,1);outline:none;}
.tile .tile-card{transition:filter .18s ease;}
.tile.pop{transform:scale(1.16);}
.tile.pop .tile-card{filter:drop-shadow(0 7px 9px rgba(40,40,20,.28));}
.tile.lit{transform:scale(1.07);}
.tile:focus-visible .tile-card{stroke:#2f5d3a;stroke-width:3.5;}
.tile.kc-locked{filter:grayscale(.75) opacity(.4);}
.kc-star{font-size:26px;}
.kc-lock{font-size:26px;}
.road-line,.road-mid{transition:stroke .15s ease,stroke-width .15s ease;}
.road-line.hot{stroke:var(--hot);stroke-width:11;}
.road-mid.hot{stroke:#fff3d6;}
.rail-line,.rail-tie{transition:stroke .15s ease,stroke-width .15s ease;}
.rail-line.hot{stroke:var(--rail-hot);stroke-width:8;}
.rail-tie.hot{stroke:var(--rail-hot);stroke-width:4;}
@media (prefers-reduced-motion:reduce){.tile,.tile .tile-card,.road-line,.rail-line,.rail-tie{transition:none;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div class="logo"><span class="bun">🐰</span> Clover's Playground</div>
    <div class="hud">
      <div class="chip" id="chipCoins">🪙 <span id="coinsVal">0</span></div>
      <div class="chip" id="chipStars">⭐ <span id="starsVal">0</span></div>
      <div class="chip" id="chipTreats">🧋 <span id="treatsVal">0</span></div>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-tab="adventure"><span class="emo">🗺️</span>KC Adventure</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="math"><span class="emo">⏱️</span>Math Challenge</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="story"><span class="emo">📖</span>Story Time</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="geo"><span class="emo">🌍</span>Geography</button>
  </nav>

  <section class="panel active" id="panel-adventure">
    <p class="intro">Tap a landmark to help Clover! Earn ⭐ to open new parts of the city. 🏠 Home is your trophy room.</p>
    <div class="map-wrap">
    <svg id="map" viewBox="0 0 680 976" role="img" aria-label="Interactive grid map of Kansas City landmarks">
      <defs>
        <filter id="softshadow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3a402a" flood-opacity="0.22"/>
        </filter>
        <linearGradient id="watergrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#9ad7ef"/>
          <stop offset="1" stop-color="#5fb6da"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
    <div class="legend">
      <span><i class="lk river"></i>River</span><span><i class="lk road"></i>Road</span>
      <span><i class="lk rail"></i>Light rail</span><span><i class="lk active"></i>Active route</span>
    </div>
  </section>

  <section class="panel" id="panel-math"><div class="card" id="mathHost"></div></section>
  <section class="panel" id="panel-story"><div class="card" id="storyHost"></div></section>
  <section class="panel" id="panel-geo"><div class="card center"><h2>🌍 Geography Challenge</h2><p class="sub">States &amp; continents maps are coming to this tab next.</p><p class="cs">🐰 Clover's packing her suitcase…</p></div></section>
</div>

<div class="stop-ov" id="stopOv">
  <div class="stop-card">
    <div class="stop-hero">
      <button class="stop-x" id="stopClose" aria-label="Close">✕</button>
      <img id="stopImg" alt="">
      <div class="stop-name" id="stopName"></div>
    </div>
    <div class="stop-body" id="stopHost"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============ SHELL CORE ============ */
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const SKEY='clover_playground_kc_v1';
const DEFAULTS={ name:'', coins:0, stars:{}, treats:{}, trophies:{}, unlockedTiers:1, storiesDone:{} };
let state=load();
function load(){ try{ const r=localStorage.getItem(SKEY); return Object.assign(JSON.parse(JSON.stringify(DEFAULTS)), r?JSON.parse(r):{});}catch(e){ return JSON.parse(JSON.stringify(DEFAULTS)); } }
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(state)); }catch(e){} }

const TREATS={ '3C':{emoji:'🧋',name:'Boba Tea'}, '6D':{emoji:'🥧',name:'Key Lime Pie'} };
const STARS_TO_UNLOCK=3;
function tierOf(key){ const row=+key[0]; return row>=7?1:row>=4?2:3; }
function starsInTier(t){ return Object.keys(state.stars).filter(k=>tierOf(k)===t).length; }

/* shared math generator usable by stop files via ctx.math.gen */
const KCMath={ gen(op,lvl){
  const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a, M='\u2212', X='\u00d7';
  const add=()=>{let a,b; if(lvl===0){a=r(1,12);b=r(1,Math.max(1,20-a));}else if(lvl===1){a=r(5,49);b=r(2,50);}else{a=r(10,89);b=r(2,Math.max(2,99-a));} return {q:a+' + '+b,a:a+b};};
  const sub=()=>{let a,b; if(lvl===0){a=r(2,20);b=r(1,a);}else if(lvl===1){a=r(20,60);b=r(2,a-1);}else{a=r(40,99);b=r(10,a-1);} return {q:a+' '+M+' '+b,a:a-b};};
  const mul=()=>{let t,b; if(lvl===0){t=[2,5,10][r(0,2)];b=r(1,10);}else if(lvl===1){t=r(2,6);b=r(1,10);}else{t=r(2,12);b=r(2,12);} return {q:t+' '+X+' '+b,a:t*b};};
  if(op==='add')return add(); if(op==='sub')return sub(); if(op==='mul')return mul(); return Math.random()<0.5?add():sub();
}};

/* stop registry — each games/*.js file registers itself here */
window.Stops={ registry:{}, register(key,def){ this.registry[key]=def; } };

/* HUD + map state */
function renderHUD(){ $('#coinsVal').textContent=state.coins; $('#starsVal').textContent=Object.keys(state.stars).length; $('#treatsVal').textContent=Object.keys(state.treats).length;
  const c=$('#chipCoins'); c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop'); }
function addStarBadge(g){ if(g.querySelector('.kc-star'))return; const b=g.getBBox();
  const t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('class','kc-star');
  t.setAttribute('x',b.x+b.width-15); t.setAttribute('y',b.y+24); t.setAttribute('text-anchor','middle'); t.textContent='\u2B50'; g.appendChild(t); }
function applyMapState(){ $$('#map .tile').forEach(g=>{ const key=g.dataset.key; const locked=tierOf(key)>state.unlockedTiers;
  g.classList.toggle('kc-locked',locked); if(state.stars[key]) addStarBadge(g); }); }
function recomputeUnlocks(){ let changed=false;
  if(state.unlockedTiers<2 && starsInTier(1)>=STARS_TO_UNLOCK){ state.unlockedTiers=2; changed=true; }
  if(state.unlockedTiers<3 && starsInTier(2)>=STARS_TO_UNLOCK){ state.unlockedTiers=3; changed=true; }
  if(changed){ save(); applyMapState(); } return changed; }

/* awarding (called by stop files via ctx.award) */
function award(key,opts){ opts=opts||{}; if(opts.coins) state.coins+=opts.coins;
  let newStar=false; if(opts.star && !state.stars[key]){ state.stars[key]=true; newStar=true; }
  if(opts.treat && TREATS[key]) state.treats[key]=true;
  save(); renderHUD(); applyMapState(); confetti();
  if(opts.treat && TREATS[key]) toast(TREATS[key].emoji+' Treat earned: '+TREATS[key].name+'!');
  else if(newStar) toast('\u2B50 Star earned!');
  if(recomputeUnlocks()) setTimeout(()=>{ toast('\uD83C\uDF89 New part of the city unlocked!'); confetti(); },1200); }

function makeCtx(key){ return { key, state, math:KCMath, award:o=>award(key,o), close:closeStop, toast, confetti }; }

/* stop overlay */
const ov=$('#stopOv');
function openStop(key){
  const tile=document.querySelector('#map .tile[data-key="'+key+'"]');
  const label=tile?(tile.getAttribute('aria-label')||''):''; const name=label.split(',')[0]||'Stop';
  const imgEl=tile?tile.querySelector('image'):null; const img=imgEl?imgEl.getAttribute('href'):'';
  $('#stopImg').src=img||''; $('#stopName').textContent=name;
  const host=$('#stopHost'); host.innerHTML=''; ov.classList.add('show');
  if(key==='9D'){ renderHome(host); }
  else if(window.Stops.registry[key]){ window.Stops.registry[key].start(host, makeCtx(key)); }
  else { host.innerHTML='<p class="cs">\uD83D\uDC30 Clover will have something fun to do here soon!</p>'; }
}
function closeStop(){ ov.classList.remove('show'); }
$('#stopClose').onclick=closeStop;
ov.addEventListener('click',e=>{ if(e.target===ov) closeStop(); });

/* home / dashboard */
function renderHome(host){
  const totalStars=Object.keys(state.stars).length;
  host.innerHTML =
    '<div class="row" style="justify-content:center;margin-bottom:12px"><label style="font-weight:800;color:var(--ink-soft)">Name: </label>'+
    '<input class="nameinput" id="homeName" maxlength="16" placeholder="Type your name"></div>'+
    '<div class="dash-grid">'+
      '<div class="dash-box"><div class="num">'+state.coins+'</div>🪙 coins</div>'+
      '<div class="dash-box"><div class="num">'+totalStars+'</div>⭐ stars</div>'+
    '</div>'+
    '<h3 class="mt">🍰 Treat Shelf</h3><div class="shelf">'+
      Object.keys(TREATS).map(k=>'<div class="treat '+(state.treats[k]?'have':'')+'" title="'+TREATS[k].name+'">'+TREATS[k].emoji+'</div>').join('')+
    '</div>'+
    '<h3 class="mt">💾 Save & Backup</h3><p class="sub">Progress saves on this device. Export a backup to keep it safe or move it to another device.</p>'+
    '<div class="row"><button class="btn teal sm" id="expBtn">⬇ Export backup</button>'+
    '<button class="btn ghost sm" id="impBtn">⬆ Import backup</button>'+
    '<input type="file" id="impFile" accept="application/json" style="display:none"></div>';
  const nm=$('#homeName'); nm.value=state.name; nm.oninput=e=>{ state.name=e.target.value.trim(); save(); };
  $('#expBtn').onclick=exportSave; $('#impBtn').onclick=()=>$('#impFile').click(); $('#impFile').onchange=importSave;
}
function exportSave(){ const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='clover-progress.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup saved!'); }
function importSave(e){ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result); state=Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),data); save(); renderHUD(); applyMapState(); renderHome($('#stopHost')); toast('Backup loaded!'); }catch(err){ toast('That file could not be read.'); } };
  rd.readAsText(f); }

/* tabs (express lanes reuse the stop activities) */
function setTab(id){ $$('.tab').forEach(t=>t.setAttribute('aria-selected',t.dataset.tab===id));
  $$('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  if(id==='math' && window.Stops.registry['7F']) window.Stops.registry['7F'].start($('#mathHost'), makeCtx('7F'));
  if(id==='story' && window.Stops.registry['7C']) window.Stops.registry['7C'].start($('#storyHost'), makeCtx('7C'));
  window.scrollTo({top:0,behavior:'smooth'}); }
$$('.tab').forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

/* toast + confetti */
let tT=null; function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }
function confetti(){ if(matchMedia('(prefers-reduced-motion: reduce)').matches)return; const em=['⚽','🪙','⭐','🎉','🏆','🧋'];
  for(let i=0;i<22;i++){ const c=document.createElement('div'); c.className='confetti'; c.textContent=em[Math.floor(Math.random()*em.length)];
    c.style.left=Math.random()*100+'vw'; c.style.animationDuration=(1.6+Math.random()*1.3)+'s'; c.style.fontSize=(15+Math.random()*15)+'px';
    document.body.appendChild(c); setTimeout(()=>c.remove(),3100); } }
</script>

<!-- per-stop game files -->
<script src="games/library.js"></script>
<script src="games/soccer-fields.js"></script>
<script src="games/border-star.js"></script>

<!-- the finalized KC map (unchanged) -->
<script>

(function(){
  const SVG="http://www.w3.org/2000/svg";
  const map=document.getElementById('map');
  const defs=map.querySelector('defs');

  // ---- grid geometry (9 rows now) ----
  const COLS=['A','B','C','D','E','F'];
  const ROWS=[1,2,3,4,5,6,7,8,9];
  const S=100, PAD_L=56, PAD_T=56;

  const colIndex=c=>COLS.indexOf(c);
  const cellX=key=>PAD_L+colIndex(key[1])*S;        // key "9D" -> row 9, col D

  // ---- layers ----
  const gLand=add(map,'g',{}), gWater=add(map,'g',{}), gCity=add(map,'g',{}), gGrid=add(map,'g',{}),

  // ---- city zones, terrain motifs ----
  const ZONE_FILL={park:'#dcebc6', downtown:'#e6e1d4', hood:'#efe5cb'};
  const ZONE_EDGE={park:'#c7dcab', downtown:'#d7d1c0', hood:'#ddd0ad'};
  const PARK_OVERRIDE=new Set(['7E','8E','9F','3D','8D']);
  const HOOD_OVERRIDE=new Set(['3F','4F']);
  function cellType(key){
    if(PARK_OVERRIDE.has(key)) return 'park';
    if(HOOD_OVERRIDE.has(key)) return 'hood';
    const row=+key[0];
    if(row<=2) return 'park';      // riverfront greenery
    if(row<=4) return 'downtown';  // River Market / Kauffman core
    if(row<=6) return 'park';      // museum + Union Station midtown
    return 'hood';                 // southern neighborhoods
  }
  function seed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return()=>{h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}

  function tree(cxp,cyp,r){
    add(gCity,'rect',{x:cxp-1.5,y:cyp,width:3,height:r,fill:'#9c7b4f','fill-opacity':0.5});
    add(gCity,'circle',{cx:cxp,cy:cyp,r:r,fill:'#8fb86a','fill-opacity':0.62});
    add(gCity,'circle',{cx:cxp-r*0.55,cy:cyp+1,r:r*0.66,fill:'#a6c884','fill-opacity':0.5});
  }
  function building(x,y,w,h,col){
    add(gCity,'rect',{x,y,width:w,height:h,rx:2,fill:col,'fill-opacity':0.6});
    add(gCity,'rect',{x,y,width:w,height:3,fill:'#000','fill-opacity':0.06});
  }
  function house(x,y,s,col){
    add(gCity,'rect',{x,y,width:s,height:s*0.72,fill:col,'fill-opacity':0.52});
    add(gCity,'path',{d:`M ${x-2} ${y} L ${x+s/2} ${y-s*0.55} L ${x+s+2} ${y} Z`,fill:'#c08a63','fill-opacity':0.55});
  }
  function drawCity(key,type){
    const x=cellX(key), y=cellY(key), rng=seed(key);
    if(type==='park'){
      const n=2+Math.floor(rng()*2);
      for(let i=0;i<n;i++) tree(x+22+rng()*56, y+30+rng()*46, 6+rng()*3);
    }else if(type==='downtown'){
      const pal=['#cbc7ba','#c1bdaf','#d3cfc1'];
      for(let i=0;i<3;i++){const w=14+rng()*10, h=20+rng()*26; building(x+16+i*22+rng()*4, y+78-h, w, h, pal[i%pal.length]);}
    }else{
      const pal=['#dcc9a3','#e2d2ad','#d6c298'];
      const n=2+Math.floor(rng()*2);
      for(let i=0;i<n;i++) house(x+20+rng()*42, y+46+rng()*28, 12+rng()*5, pal[i%pal.length]);
    }
  }
  function drawWater(key){
    const bx=cellX(key), by=cellY(key), rng=seed('w'+key);

    }

      const cp=add(defs,'clipPath',{id:cid});
      add(cp,'rect',{x:x+11,y:y+11,width:S-22,height:S-22,rx:14});
      add(card,'image',{href:info.img,x:x+11,y:y+11,width:S-22,height:S-22,preserveAspectRatio:'xMidYMid slice','clip-path':`url(#${cid})`});
      add(card,'rect',{x:x+11,y:y+70,width:S-22,height:19,fill:info.color,'fill-opacity':0.9,'clip-path':`url(#${cid})`});
      add(card,'text',{x:x+S/2,y:y+83,'text-anchor':'middle','font-family':'Fredoka','font-weight':600,'font-size':10.5,fill:'#fff'}).textContent=info.name;
      add(card,'rect',{x:x+10,y:y+10,width:S-20,height:S-20,rx:16,fill:'none',stroke:info.color,'stroke-width':3});
      add(card,'rect',{x:x+15,y:y+15,width:25,height:15,rx:7,fill:info.color});
      add(card,'text',{x:x+27.5,y:y+26,'text-anchor':'middle','font-family':'Nunito','font-weight':800,'font-size':10.5,fill:'#fff'}).textContent=key;
    }else{
      // placeholder tile: emoji + header
      add(card,'rect',{x:x+10,y:y+10,width:S-20,height:S-20,rx:16,fill:'#fffefa',stroke:info.color,'stroke-width':3});
      add(card,'rect',{x:x+10,y:y+10,width:S-20,height:24,rx:12,fill:info.color});
      add(card,'rect',{x:x+10,y:y+22,width:S-20,height:12,fill:info.color});
      add(card,'text',{x:x+S/2,y:y+27,'text-anchor':'middle','font-family':'Nunito','font-weight':800,'font-size':12,fill:'#fff'}).textContent=key;
      add(card,'text',{x:x+S/2,y:y+62,'text-anchor':'middle','font-size':32}).textContent=info.icon;
      add(card,'text',{x:x+S/2,y:y+84,'text-anchor':'middle','font-family':'Fredoka','font-weight':600,'font-size':10.5,fill:'#3a4533'}).textContent=info.name;
    }
    tileEls[key]=g;
  });

  // ---- interactivity ----
  let pinned=null;
  function clear(){
    Object.values(tileEls).forEach(t=>t.classList.remove('pop','lit'));
    gRoads.querySelectorAll('.road-line,.road-mid').forEach(l=>l.classList.remove('hot'));
    gRail.querySelectorAll('.rail-line,.rail-tie').forEach(l=>l.classList.remove('hot'));
  }
  function light(key){
    clear();
    const tile=tileEls[key];if(!tile)return;
    tile.classList.add('pop');
    gTiles.appendChild(tile);
    (adj[key]||[]).forEach(n=>{if(tileEls[n])tileEls[n].classList.add('lit');});
    gRoads.querySelectorAll('.road-line,.road-mid').forEach(l=>{if(l.dataset.a===key||l.dataset.b===key)l.classList.add('hot');});
    gRail.querySelectorAll('.rail-line,.rail-tie').forEach(l=>{if(l.dataset.a===key||l.dataset.b===key)l.classList.add('hot');});
  }
  Object.entries(tileEls).forEach(([key,g])=>{
    g.addEventListener('mouseenter',()=>{if(!pinned)light(key);});
    g.addEventListener('mouseleave',()=>{if(!pinned)clear();});
    g.addEventListener('focus',()=>{if(!pinned)light(key);});
    g.addEventListener('blur',()=>{if(!pinned)clear();});
    g.addEventListener('click',e=>{e.stopPropagation();if(pinned===key){pinned=null;clear();}else{pinned=key;light(key);}});
    g.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();g.dispatchEvent(new Event('click'));}});
  });
  map.addEventListener('click',()=>{pinned=null;clear();});
})();

</script>

<!-- shell init: runs after the map has been drawn -->
<script>
(function(){
  const mapEl=document.getElementById('map');
  // intercept tile clicks (capture phase) to open stops instead of the map's own pin behavior
  mapEl.addEventListener('click',function(e){
    const t=e.target.closest('.tile'); if(!t) return;
    e.stopPropagation();
    const key=t.dataset.key;
    if(tierOf(key)>state.unlockedTiers){ toast('🔒 Earn '+STARS_TO_UNLOCK+' ⭐ to open this part of the city!'); return; }
    openStop(key);
  },true);
  renderHUD();
  applyMapState();
})();
</script>
